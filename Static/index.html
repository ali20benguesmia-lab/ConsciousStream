<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsciousStream</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#0f1117;color:#e8eaed;height:100vh;display:flex;flex-direction:column}
        header{background:#1a1d27;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2d3143}
        header h1{font-size:18px;display:flex;align-items:center;gap:8px}
        #chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
        .msg{display:flex;gap:8px;max-width:80%;animation:fade .3s}
        @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .msg.user{align-self:flex-end;flex-direction:row-reverse}
        .msg.assistant{align-self:flex-start}
        .bubble{background:#242736;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.6;word-break:break-word}
        .user .bubble{background:#6366f1;color:white;border-bottom-right-radius:4px}
        .assistant .bubble{border-bottom-left-radius:4px}
        .sys{text-align:center;font-size:12px;color:#9aa0a6;padding:4px 12px;background:#1a1d27;border-radius:12px;align-self:center}
        #inputArea{background:#1a1d27;padding:10px 14px;border-top:1px solid #2d3143;display:flex;gap:8px;align-items:center}
        #inputArea input{flex:1;background:#242736;border:1px solid #2d3143;color:white;padding:10px 16px;border-radius:24px;font-size:14px;outline:none;font-family:inherit}
        #inputArea input:focus{border-color:#6366f1}
        #inputArea input::placeholder{color:#6b7280}
        #sendBtn{background:#6366f1;color:white;border:none;padding:10px 20px;border-radius:24px;font-size:18px;cursor:pointer;transition:.2s}
        #sendBtn:active{transform:scale(.95)}
        #sendBtn:disabled{opacity:0.5}
        #status{font-size:12px;color:#9aa0a6}
        .online{color:#10b981}
        .offline{color:#ef4444}
        .typing .bubble{display:flex;gap:4px;padding:12px 16px}
        .typing .bubble span{width:6px;height:6px;border-radius:50%;background:#9aa0a6;animation:bounce 1.4s infinite}
        .typing .bubble span:nth-child(2){animation-delay:.2s}
        .typing .bubble span:nth-child(3){animation-delay:.4s}
        @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
        
        .task-bar{background:#1a1d27;padding:8px 12px;display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid #2d3143}
        .task{background:#242736;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;flex-shrink:0;transition:.2s;border:2px solid transparent}
        .task.active{background:#6366f1;color:white}
        .task-add{background:transparent;border:2px dashed #2d3143;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0}
        
        .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;z-index:100}
        .modal.show{display:flex}
        .modal>div{background:#1a1d27;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:70vh;overflow-y:auto}
        .modal h3{text-align:center;margin-bottom:16px}
        .modal input{width:100%;padding:12px;background:#242736;border:1px solid #2d3143;color:white;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none}
        .modal input:focus{border-color:#6366f1}
        .modal button{width:100%;padding:12px;background:#6366f1;color:white;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}
        .modal button.gray{background:#242736}
    </style>
</head>
<body>

<header>
    <h1>🧠 ConsciousStream</h1>
    <span id="status">⏳ جارٍ الاتصال...</span>
</header>

<div class="task-bar" id="taskBar">
    <span class="task active" onclick="switchTask('الرئيسية')">الرئيسية</span>
    <span class="task-add" onclick="showAddTask()">+</span>
</div>

<div id="chat">
    <div class="sys">👋 مرحباً! أنا ConsciousStream. اكتب رسالتك...</div>
</div>

<div id="inputArea">
    <input id="userInput" placeholder="اكتب رسالتك..." autocomplete="off">
    <button id="sendBtn" onclick="send()">➤</button>
</div>

<div class="modal" id="addTaskModal">
    <div>
        <h3>➕ مهمة جديدة</h3>
        <input id="newTaskName" placeholder="اسم المهمة...">
        <button onclick="addNewTask()">إضافة</button>
        <button class="gray" onclick="hideAddTask()">إلغاء</button>
    </div>
</div>

<script>
const SERVER_URL = window.location.origin;

let sessionId = null;
let currentTask = 'الرئيسية';
const tasks = ['الرئيسية'];
const messages = {};
messages['الرئيسية'] = [];

async function connect() {
    try {
        const res = await fetch(SERVER_URL + '/api/sessions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ goal_text: 'جلسة عامة' })
        });
        const data = await res.json();
        sessionId = data.session_id;
        document.getElementById('status').textContent = '🟢 متصل';
        document.getElementById('status').className = 'online';
        addSystemMessage('✅ تم الاتصال بالخادم!');
    } catch (e) {
        document.getElementById('status').textContent = '🔴 غير متصل';
        document.getElementById('status').className = 'offline';
        addSystemMessage('⚠️ وضع المحاكاة');
    }
}

async function send() {
    const input = document.getElementById('userInput');
    const message = input.value.trim();
    if (!message) return;
    
    if (message.startsWith('/switch ')) {
        switchTask(message.replace('/switch ', '').trim());
        input.value = '';
        return;
    }
    if (message.startsWith('/new ')) {
        addTask(message.replace('/new ', '').trim());
        input.value = '';
        return;
    }
    if (message === '/list') {
        addSystemMessage('📋 المهام: ' + tasks.join('، '));
        input.value = '';
        return;
    }
    if (message === '/clear') {
        document.getElementById('chat').innerHTML = '';
        addSystemMessage('🔄 تم المسح');
        input.value = '';
        return;
    }
    
    addMessage('user', message);
    input.value = '';
    document.getElementById('sendBtn').disabled = true;
    
    const typingId = showTyping();
    
    try {
        const res = await fetch(SERVER_URL + '/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                session_id: sessionId,
                message: message,
                task_id: currentTask
            })
        });
        const data = await res.json();
        removeTyping(typingId);
        addMessage('assistant', data.response);
        messages[currentTask].push({ role: 'assistant', content: data.response });
    } catch (e) {
        removeTyping(typingId);
        const reply = mockReply(message);
        addMessage('assistant', reply);
        messages[currentTask].push({ role: 'assistant', content: reply });
    }
    
    document.getElementById('sendBtn').disabled = false;
}

function mockReply(msg) {
    const m = msg.toLowerCase();
    if (m.includes('مرحبا') || m.includes('السلام')) return '👋 وعليكم السلام! كيف يمكنني مساعدتك؟';
    if (m.includes('كيف حال')) return '😊 أنا بخير! وأنت؟';
    if (m.includes('شكر')) return '🙏 العفو!';
    if (m.includes('اسم')) return '🧠 اسمي ConsciousStream!';
    const replies = ['💡 فهمت!', '🎯 تمام!', '🧠 فكرة جيدة!', '📝 شكراً!'];
    return replies[Math.floor(Math.random() * replies.length)];
}

function addMessage(type, text) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg ' + type;
    div.innerHTML = `<div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function addSystemMessage(text) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'sys';
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
    const id = 'typing-' + Date.now();
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg assistant typing';
    div.id = id;
    div.innerHTML = `<div class="bubble"><span></span><span></span><span></span></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return id;
}

function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
}

function switchTask(task) {
    if (!tasks.includes(task)) { tasks.push(task); messages[task] = []; }
    currentTask = task;
    renderTasks();
    addSystemMessage('🔀 تم التبديل إلى: ' + task);
}

function addTask(task) {
    if (!task || tasks.includes(task)) return;
    tasks.push(task);
    messages[task] = [];
    renderTasks();
    addSystemMessage('➕ مهمة جديدة: ' + task);
}

function renderTasks() {
    const bar = document.getElementById('taskBar');
    bar.innerHTML = tasks.map(t => 
        `<span class="task ${t === currentTask ? 'active' : ''}" onclick="switchTask('${t}')">${t}</span>`
    ).join('') + `<span class="task-add" onclick="showAddTask()">+</span>`;
}

function showAddTask() {
    document.getElementById('addTaskModal').classList.add('show');
    setTimeout(() => document.getElementById('newTaskName').focus(), 300);
}
function hideAddTask() {
    document.getElementById('addTaskModal').classList.remove('show');
}
function addNewTask() {
    const name = document.getElementById('newTaskName').value.trim();
    if (name) { addTask(name); switchTask(name); document.getElementById('newTaskName').value = ''; hideAddTask(); }
}

document.getElementById('userInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') send();
});

document.querySelectorAll('.modal').forEach(m => {
    m.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });
});

connect();
</script>
</body>
</html>
